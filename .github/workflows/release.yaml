name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Target Tag Name (e.g., v1.2.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  pull-requests: write

env:
  GO_VERSION: '1.26'

jobs:
  release-please:
    if: github.event_name == 'push'
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name:        ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: .github/release-please-config.json
          manifest-file: .manifest.json

  build-and-publish:
    needs: release-please
    if: |
      !cancelled() && (
        (github.event_name == 'push' && needs.release-please.outputs.release_created == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    name: build-and-publish
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name || inputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Syft
        run: |
          curl -sSfL https://get.anchore.io/syft | sudo sh -s -- -b /usr/local/bin

      # v4.0.0
      - uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad

      # Run GoReleaser to build binaries, archives, packages, and SBOMs.
      - name: Build Artifacts
        # v6.4.0
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ env.RELEASE_TAG }}

      # Upload all generated artifacts to the release.
      # GitHub auto-marks this as latest by semver rules (no prerelease/draft).
      - name: Upload Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ env.RELEASE_TAG }}"

          echo "Uploading artifacts to release: $TAG_NAME"

          gh release upload "$TAG_NAME" \
            dist/*.tar.gz \
            dist/*.json \
            dist/*.deb \
            dist/*.apk \
            dist/*.rpm \
            dist/*.zst \
            dist/checksums.txt \
            --clobber
