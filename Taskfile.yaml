version: '3'

tasks:
  default:
    desc: List available tasks
    cmd: task --list

  build:
    desc: Build spoofdpi binary
    cmd: go build ./cmd/...

  run:
    desc: Build and run with dynamic arguments
    deps: [build]
    cmd: sudo -E ./spoofdpi {{.CLI_ARGS}}

  test:
    desc: Run tests with race detector
    cmd: go test -race ./...

  lint:
    desc: Run golangci-lint
    cmd: golangci-lint run

  fmt:
    desc: Format code with gofmt
    cmd: gofmt -w .

  fmt-check:
    desc: Verify formatting matches gofmt
    cmd: test -z "$(gofmt -l .)"

  pre-commit:
    desc: Pre-commit checks (test + fmt-check + lint)
    cmds:
      - task: test
      - task: fmt-check
      - task: lint

  docs:
    desc: Serve docs locally (mkdocs)
    cmd: mkdocs serve
